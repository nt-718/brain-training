<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mten-bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b" />
      <stop offset="1" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="mten-accent-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#ec4899" />
    </linearGradient>
    <filter id="mten-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#mten-bg-grad)" />
  
  <!-- Central "10" -->
  <circle cx="50" cy="50" r="28" fill="url(#mten-accent-grad)" filter="url(#mten-glow)" fill-opacity="0.9" />
  <text x="50" y="60" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-weight="900" font-size="30">10</text>
  
  <!-- Number Tiles -->
  <rect x="18" y="18" width="16" height="16" rx="5" fill="#10b981" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5" />
  <text x="26" y="30" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="11">2</text>
  
  <rect x="66" y="18" width="16" height="16" rx="5" fill="#10b981" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5" />
  <text x="74" y="30" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="11">3</text>
  
  <rect x="18" y="66" width="16" height="16" rx="5" fill="#10b981" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5" />
  <text x="26" y="78" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="11">4</text>
  
  <rect x="66" y="66" width="16" height="16" rx="5" fill="#10b981" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5" />
  <text x="74" y="78" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="11">1</text>
  
  <!-- Symbols -->
  <text x="50" y="15" text-anchor="middle" fill="white" fill-opacity="0.7" font-weight="900" font-size="14">÷</text>
  <text x="50" y="93" text-anchor="middle" fill="white" fill-opacity="0.7" font-weight="900" font-size="14">+</text>
  <text x="10" y="55" text-anchor="middle" fill="white" fill-opacity="0.7" font-weight="900" font-size="14">×</text>
  <text x="90" y="55" text-anchor="middle" fill="white" fill-opacity="0.7" font-weight="900" font-size="14">-</text>
</svg>
